<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demega Smart Match</title>
  <link rel="stylesheet" href="/demega-professional-ui.css">
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#f8fafc; color:#0f172a; }
    .hero { background:#111827; color:white; padding:28px 16px; }
    .wrap { width:min(1180px, calc(100% - 24px)); margin:auto; }
    .panel { background:white; border:1px solid #e2e8f0; border-radius:18px; padding:18px; margin-top:18px; box-shadow:0 2px 8px rgba(15,23,42,.06); }
    textarea { width:100%; min-height:120px; border:1px solid #cbd5e1; border-radius:12px; padding:12px; }
    .btn { background:#0f766e; color:white; border:0; border-radius:12px; padding:12px 16px; font-weight:800; cursor:pointer; margin-top:12px; }
    pre { white-space:pre-wrap; background:#f1f5f9; padding:14px; border-radius:14px; }
  </style>
</head>
<body>
  <header class="hero"><div class="wrap"><h1>Smart Match</h1><p>Match buyer request against manual inventory records before quote.</p></div></header>
  <main class="wrap">
    <section class="panel">
      <h2>Buyer Request</h2>
      <textarea id="requestText" placeholder="Example: Corolla 2005 alternator urgent"></textarea>
      <button class="btn" onclick="match()">Run Smart Match</button>
    </section>
    <section class="panel"><h2>Match Result</h2><pre id="result">No match checked yet.</pre></section>
  </main>
  <script>
    async function match() {
      const text = document.getElementById("requestText").value;
      const res = await fetch("/api/smart-match/check", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ text }) });
      document.getElementById("result").textContent = JSON.stringify(await res.json(), null, 2);
    }
  </script>
</body>
</html>
